<div class="pagination">

  <button 
    class="nav-btn"
    (click)="goToPrev()"
    [disabled]="currentPage === 1">
    Prev
  </button>

  <span class="page-info">
    {{ currentPage }} / {{ totalPages }}
  </span>

  <button 
    class="nav-btn"
    (click)="goToNext()"
    [disabled]="currentPage === totalPages">
    Next
  </button>

</div>
