<div class="add-wrapper">
  <div class="add-container">

    <!-- Back -->
    <button class="back-btn" (click)="onCancel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
      </svg>
      Back
    </button>

    <!-- Card -->
    <div class="form-card">

      <div class="card-header">
        <div class="header-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </div>
        <h2 class="card-title">Add New Product</h2>
      </div>

      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Product Title -->
        <div class="form-group">
          <label class="form-label">
            Product Title <span class="required">*</span>
          </label>
          <input
            class="form-control"
            [class.is-invalid]="submitted && f['title'].errors"
            formControlName="title"
            type="text"
            placeholder="Enter product title"
          />
          <div class="error-msg" *ngIf="submitted && f['title'].errors">
            <span *ngIf="f['title'].errors?.['required']">Title is required.</span>
            <span *ngIf="f['title'].errors?.['minlength']">Minimum 3 characters required.</span>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label class="form-label">
            Description <span class="required">*</span>
          </label>
          <textarea
            class="form-control"
            [class.is-invalid]="submitted && f['description'].errors"
            formControlName="description"
            placeholder="Enter product description"
            rows="4"
          ></textarea>
          <div class="error-msg" *ngIf="submitted && f['description'].errors">
            <span *ngIf="f['description'].errors?.['required']">Description is required.</span>
            <span *ngIf="f['description'].errors?.['minlength']">Minimum 10 characters required.</span>
          </div>
        </div>

        <!-- Price & Stock -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">
              Price ($) <span class="required">*</span>
            </label>
            <input
              class="form-control"
              [class.is-invalid]="submitted && f['price'].errors"
              formControlName="price"
              type="number"
              placeholder="0.00"
              step="0.01"
            />
            <div class="error-msg" *ngIf="submitted && f['price'].errors">
              <span *ngIf="f['price'].errors?.['required']">Price is required.</span>
              <span *ngIf="f['price'].errors?.['min']">Price must be ≥ 0.</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              Stock Quantity <span class="required">*</span>
            </label>
            <input
              class="form-control"
              [class.is-invalid]="submitted && f['stock'].errors"
              formControlName="stock"
              type="number"
              placeholder="0"
            />
            <div class="error-msg" *ngIf="submitted && f['stock'].errors">
              <span *ngIf="f['stock'].errors?.['required']">Stock is required.</span>
              <span *ngIf="f['stock'].errors?.['min']">Stock must be ≥ 0.</span>
            </div>
          </div>
        </div>

        <!-- Category & Brand -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">
              Category <span class="required">*</span>
            </label>
            <input
              class="form-control"
              [class.is-invalid]="submitted && f['category'].errors"
              formControlName="category"
              type="text"
              placeholder="Enter category"
            />
            <div class="error-msg" *ngIf="submitted && f['category'].errors">
              <span *ngIf="f['category'].errors?.['required']">Category is required.</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Brand</label>
            <input
              class="form-control"
              formControlName="brand"
              type="text"
              placeholder="Enter brand name"
            />
          </div>
        </div>

        <!-- Thumbnail URL -->
        <div class="form-group">
          <label class="form-label">
            Thumbnail URL <span class="required">*</span>
          </label>
          <div class="input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <input
              class="form-control has-icon"
              [class.is-invalid]="submitted && f['thumbnail'].errors"
              formControlName="thumbnail"
              type="url"
              placeholder="https://example.com/image.jpg"
            />
          </div>
          <div class="error-msg" *ngIf="submitted && f['thumbnail'].errors">
            <span *ngIf="f['thumbnail'].errors?.['required']">Thumbnail URL is required.</span>
            <span *ngIf="f['thumbnail'].errors?.['pattern']">Enter a valid URL starting with http(s)://</span>
          </div>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="loading">
            <svg *ngIf="!loading" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
            <span *ngIf="loading" class="btn-spinner"></span>
            {{ loading ? 'Creating...' : 'Create Product' }}
          </button>

          <button type="button" class="btn-secondary" (click)="onCancel()">
            Cancel
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
